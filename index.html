<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Stylish Form</title>
  </head>
  <body>
    <main>
      <header>
        <h1>Say Hello!</h1>
      </header>

      <form action="./submitted.html">
        <div class="input-container">
          <label for="user-name">Your Name</label>
          <input type="text" name="" id="user-name" placeholder="Enter your name" minlength="5" maxlength="50" pattern="[a-zA-Z\s.]{5,50}" required>
          <!-- Only match letters, whitespace and dots up to 50 times -->
        </div>

        <div class="input-container">
          <label for="user-email">Email</label>
          <input type="email" name="" id="user-email" placeholder="Enter your email adress" required>
        </div>

        <div class="input-container">
          <label for="user-service">Needed Services</label>
          <select name="" id="user-service" required>
            <option value="" disabled selected>Choose Services</option>
            <option value="">Coffee</option>
            <option value="">Cocaine</option>
            <option value="">Lossüßer</option>
          </select>
        </div>

        <div class="input-container">
          <label for="user-budget">Budget</label>
          <select name="" id="user-budget" required>
            <option value="" disabled selected >Select Budget</option>
            <option value="">1 €</option>
            <option value="">18.7 Mio. €</option>
            <option value="">419.99 €</option>
          </select>
        </div>

        <div class="input-container">
          <label for="user-message">Message</label>
          <textarea rows="4" name="" id="user-message" placeholder="Your message here..." minlength="10" maxlength="250"></textarea>
        </div>


        <button type="submit">
          <p>Submit</p>
          <img class="cover" src="./images/arrow-right.svg" alt="">
        </button>
        
        <!-- <button type="reset">
          <p>Reset</p>
        </button> -->
        
      </form>
    </main>
  </body>
</html>
