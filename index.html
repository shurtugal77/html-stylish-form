<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Stylish Form</title>
  </head>
  <body>
    <main>
      <header>
        <h1>Say Hello!</h1>
      </header>

      <form action="">
        <div class="input-container">
          <label for="user-name">Your Name</label>
          <input type="text" name="" id="user-name" placeholder="Enter your name">
        </div>

        <div class="input-container">
          <label for="user-email">Email</label>
          <input type="email" name="" id="user-email" placeholder="Enter your email adress">
        </div>

        <div class="input-container">
          <label for="user-service">Needed Services</label>
          <select name="" id="user-service">
            <option value="" disabled selected hidden>Choose Services</option>
            <option value="">Deez Nuts</option>
            <option value="">Deez</option>
            <option value="">Nuts</option>
          </select>
        </div>

        <div class="input-container">
          <label for="user-budget">Budget</label>
          <select name="" id="user-budget">
            <option value="" disabled selected hidden>Select Budget</option>
            <option value="">1</option>
            <option value="">2</option>
            <option value="">3</option>
          </select>
        </div>

        <div class="input-container">
          <label for="user-message">Message</label>
          <textarea name="" id="user-message" placeholder="Your message here..."></textarea>
        </div>

        
        <button type="submit">Button</button>
        <!-- <button type="reset">Reset</button> -->
        
      </form>
    </main>
  </body>
</html>
