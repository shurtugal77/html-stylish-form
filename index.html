<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Stylish Form</title>
  </head>
  <body>
    <main>
      <form action="">
        <header>
        <h1>Say Hello</h1>
        </header>

        <div class="input-container">
          <label for="">Your Name
            <input type="text" name="" id="" placeholder="Enter your name">
          </label>
        </div>

        <div class="input-container">
          <label for="">Email
            <input type="email" name="" id="" placeholder="Enter your email adress">
          </label>
        </div>

        <div class="input-container">
          <label for="">Needed Services
            <select name="" id="">
              <option value="" disabled selected hidden>Choose Services</option>
              <option value="">Deez Nuts</option>
              <option value="">Deez</option>
              <option value="">Nuts</option>
            </select>
          </label>
        </div>

        <div class="input-container">
          <label for="">Budget
            <select name="" id="">
              <option value="" disabled selected hidden>Select Budget</option>
              <option value="">1</option>
              <option value="">2</option>
              <option value="">3</option>
            </select>
          </label>
        </div>

        <div class="input-container">
          <label for="">Message
            <textarea name="" id="" placeholder="Your message here..."></textarea>
          </label>
        </div>

        <div class="input-container">
          <button type="submit">Button</button>
          <!-- <button type="reset">Reset</button> -->
        </div>
      </form>
    </main>
  </body>
</html>
